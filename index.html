<!doctype html>
<html lang="es">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Digital Premium Store — Servicios Digitales al Mejor Precio</title>
  <meta name="description"
    content="Tienda premium de servicios digitales: Netflix, Spotify, Disney+, HBO Max y más. Activación inmediata, precios exclusivos y descuentos por combo." />
  <meta name="author" content="Digital Premium Store" />
  <meta property="og:title" content="Digital Premium Store — Servicios Digitales Premium" />
  <meta property="og:description"
    content="Las mejores plataformas de streaming y productividad al mejor precio. Activación inmediata." />
  <meta property="og:type" content="website" />
  <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate" />
  <meta http-equiv="Pragma" content="no-cache" />
  <meta http-equiv="Expires" content="0" />
  <script>
    // 1. Eliminar Service Workers antiguos que causan la pantalla negra
    if ('serviceWorker' in navigator) {
      navigator.serviceWorker.getRegistrations().then(function(registrations) {
        for(let registration of registrations) {
          registration.unregister();
          console.log('Service Worker desregistrado para corregir pantalla negra');
        }
      });
    }

    // 2. Cache busting para config.js con carga forzada
    (function() {
      const script = document.createElement('script');
      script.src = '/config.js?v=' + Date.now();
      script.async = false;
      document.head.appendChild(script);
    })();
  </script>
</head>

<body>
  <div id="root"></div>
  <script type="module" src="/src/main.tsx"></script>
</body>

</html>
